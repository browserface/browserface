<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Browser Interface</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <nav id="tabs" class="tabs" aria-label="Tabs"></nav>
    <header class="toolbar">
      <button id="back" class="nav" title="Back" aria-label="Back">
        <svg
          viewBox="0 0 24 24"
          width="14"
          height="14"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <line x1="19" y1="12" x2="5" y2="12" />
          <polyline points="12 19 5 12 12 5" />
        </svg>
      </button>
      <button id="forward" class="nav" title="Forward" aria-label="Forward">
        <svg
          viewBox="0 0 24 24"
          width="14"
          height="14"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <line x1="5" y1="12" x2="19" y2="12" />
          <polyline points="12 5 19 12 12 19" />
        </svg>
      </button>
      <button id="reload" class="nav" title="Reload" aria-label="Reload">
        <svg
          viewBox="0 0 24 24"
          width="14"
          height="14"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
          <polyline points="21 3 21 8 16 8" />
        </svg>
      </button>
      <form id="url-form" class="url-form">
        <input
          id="url"
          type="text"
          spellcheck="false"
          autocomplete="off"
          placeholder="https://…"
        />
      </form>
      <button
        id="open-external"
        class="nav"
        title="Open this URL in your current browser"
        aria-label="Open in this browser"
      >
        <svg
          viewBox="0 0 24 24"
          width="14"
          height="14"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <line x1="17" y1="17" x2="7" y2="7" />
          <polyline points="7 17 7 7 17 7" />
        </svg>
      </button>
    </header>
    <div id="toast" class="toast" hidden></div>
    <main class="stage" id="stage" tabindex="0">
      <div class="frame" id="frame">
        <img id="screen" alt="" draggable="false" />
        <div class="placeholder" id="placeholder">Waiting for first frame…</div>
        <div class="inactive-overlay" id="inactive-overlay" hidden>
          <div class="inactive-card">
            <div class="inactive-title">This tab is inactive</div>
            <div class="inactive-body">
              Chrome's Memory Saver has discarded this tab. Reactivating will
              reload the page (any unsaved in-page state will be lost).
            </div>
            <div class="inactive-actions">
              <button id="inactive-cancel" type="button" class="btn-secondary">
                Dismiss
              </button>
              <button id="inactive-revive" type="button" class="btn-primary">
                Reactivate
              </button>
            </div>
          </div>
        </div>
      </div>
      <footer class="statusbar">
        <a
          id="hover-link"
          class="hover-link"
          title=""
          target="_blank"
          rel="noopener noreferrer"
        ></a>
        <span id="loading-indicator" class="loading-indicator" hidden>
          <span class="loading-dot"></span>
          loading
        </span>
        <span class="meter-group">
          <span id="cdp-endpoint" class="cdp-endpoint" title="CDP target"></span>
          <span id="fps" class="fps" title="Screencast frames per second">— fps</span>
        </span>
        <span id="status" class="status" data-state="connecting">connecting…</span>
        <button
          id="resize-handle"
          class="resize-handle"
          type="button"
          title="Drag to resize the remote viewport"
          aria-label="Resize remote viewport"
        >
          <svg
            viewBox="0 0 24 24"
            width="14"
            height="14"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <line x1="10" y1="10" x2="4" y2="4" />
            <polyline points="10 4 4 4 4 10" />
            <line x1="14" y1="14" x2="20" y2="20" />
            <polyline points="20 14 20 20 14 20" />
          </svg>
        </button>
        <div id="resize-readout" class="resize-readout" hidden></div>
      </footer>
    </main>
    <input
      id="paste-helper"
      class="paste-helper"
      type="text"
      value=" "
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      aria-label="Clipboard helper (debug visible)"
    />
    <script type="module" src="./main.js"></script>
  </body>
</html>
